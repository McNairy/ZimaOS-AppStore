version: "3"
#name: technitium-dns
services:
  technitium-dns:
    image: technitium/dns-server:14.3.0
    container_name: technitium-dns
    hostname: technitium-dns
    restart: unless-stopped
    ports:
      - "5380:5380/tcp"      # Web Management Console
      - "53:53/udp"          # DNS Service (UDP)
      - "53:53/tcp"          # DNS Service (TCP)
      - "853:853/tcp"        # DNS-over-TLS (Optional)
    environment:
      - DNS_SERVER_DOMAIN=technitium-dns
      # - DNS_SERVER_ADMIN_PASSWORD=password  # Optional: Set initial password
    volumes:
      - /DATA/AppData/technitium/config:/etc/dns
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65535
    networks:
      public_net:
        ipv4_address: 192.168.42.50  # Must be an unused IP on your host

public_net:
    driver: macvlan
    driver_opts:
      parent: eth0  # Replace with your host's physical network interface (e.g., eth0, enp3s0)
    ipam:
      config:
        - subnet: 192.168.42.0/24   # Matches your host's local network range
          gateway: 192.168.42.1    # Your router's IP

# ZimaOS/CasaOS Specific Metadata
x-casaos:
  architectures:
    - amd64
    - arm64
  main: technitium-dns
  author: Michael McNairy
  category: Network
  icon: https://githubusercontent.com
  title:
    en_us: Technitium
  tagline:
    en_us: Self-host a privacy-focused DNS server.
  description:
    en_us: "Technitium DNS Server is an open-source authoritative as well as recursive DNS server that can be used for self-hosting for privacy and security."
  developer: Technitium Software
  screenshot_link:
    - https://technitium.com

